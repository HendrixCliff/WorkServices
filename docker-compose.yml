version: '3.9'

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8080:8080"

    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: WorkServicesDb

    ports:
      - "5432:5432"

  redis:
    image: redis:7

    ports:
      - "6379:6379"

  seq:
    image: datalust/seq

    environment:
      ACCEPT_EULA: Y

    ports:
      - "5341:80"