services:
  api:
    build:
      context: .
      dockerfile: src/WorkServices.API/Dockerfile

    ports:
      - "8080:8080"

    depends_on:
      - postgres
      - redis
     

  postgres:
    image: postgres:17

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: WorkServicesDb

    ports:
      - "5432:5432"

  redis:
    image: redis:7

    ports:
      - "6379:6379"

  seq:
    image: datalust/seq

    environment:
      ACCEPT_EULA: "Y"

    ports:
      - "5341:80"

  prometheus:
    image: prom/prometheus

    container_name: prometheus

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

    ports:
      - "9090:9090"

    depends_on:
      - api

  grafana:
    image: grafana/grafana

    container_name: grafana

    ports:
      - "3000:3000"

    depends_on:
      - prometheus

    volumes:
      - grafana-storage:/var/lib/grafana

volumes:
  grafana-storage: